<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
<meta name="referrer" content="no-referrer" />
<meta name="theme-color" content="#FCFBF9" />
<!-- CALL_TWO_WORKSPACE_VERSION = "2026-call-two-v1" -->
<title>The Complete Growth Blueprint · Call Two · Private Workspace</title>
<style>
  :root{
    --bg:#FCFBF8;
    --bg-deep:#F6F4EF;
    --card:#FFFFFF;
    --ink:#0A0A0A;
    --ink-2:#3A3A3A;
    --muted:#767676;
    --line:#E8E5DE;
    --line-strong:#D6D2C9;
    --bronze:#A2682C;
    --bronze-deep:#7E4F1E;
    --bronze-tint:rgba(162,104,44,0.06);
    --bronze-tint-2:rgba(162,104,44,0.14);
    --green:#3E5F45;
    --amber:#B5771F;
    --red:#8C3B2E;
    --serif:"Iowan Old Style","Palatino Linotype","Palatino","Book Antiqua",Georgia,"Times New Roman",serif;
    --sans:"Inter","Inter Variable",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --shadow:0 1px 1px rgba(10,10,10,0.02), 0 10px 30px -22px rgba(10,10,10,0.28);
    --ease:cubic-bezier(.22,1,.36,1);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    font-size:16.5px;line-height:1.55;-webkit-font-smoothing:antialiased;overflow:hidden;
  }
  ::selection{background:var(--bronze-tint-2);}

  /* ---------- Password gate ---------- */
  body.locked header.bar,
  body.locked main,
  body.locked footer.nav,
  body.locked .fnotes,
  body.locked .toast{display:none !important;}
  .gate{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:32px;background:var(--bg);}
  body.locked .gate{display:flex;}
  .gate:before{content:"";position:absolute;inset:0;background:radial-gradient(120% 90% at 50% -10%, rgba(162,104,44,0.07), transparent 60%);pointer-events:none;}
  .gate-inner{position:relative;width:100%;max-width:420px;text-align:center;animation:rise .6s var(--ease) both;}
  .gate .seal{width:44px;height:44px;margin:0 auto 28px;border-radius:50%;border:1px solid var(--line-strong);display:grid;place-items:center;background:var(--card);}
  .gate .seal svg{width:17px;height:17px;}
  .gate .brandline{font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--bronze-deep);font-weight:700;margin:0 0 14px;}
  .gate h1{font-family:var(--serif);font-weight:400;font-size:34px;margin:0 0 12px;letter-spacing:-0.02em;}
  .gate p.sub{color:var(--muted);font-size:15.5px;margin:0 0 32px;}
  .gate form{display:flex;flex-direction:column;gap:12px;}
  .gate input[type=password]{width:100%;font-family:var(--sans);font-size:18px;color:var(--ink);text-align:center;letter-spacing:.14em;background:var(--card);border:1px solid var(--line-strong);border-radius:12px;padding:16px;transition:all .25s var(--ease);}
  .gate input[type=password]:focus{outline:none;border-color:var(--bronze);box-shadow:0 0 0 4px var(--bronze-tint);}
  .gate button{appearance:none;cursor:pointer;font-family:var(--sans);font-size:15px;background:var(--ink);color:#fff;border:1px solid var(--ink);border-radius:12px;padding:16px;transition:all .25s var(--ease);}
  .gate button:hover{background:var(--bronze-deep);border-color:var(--bronze-deep);}
  .gate .err{min-height:20px;margin-top:14px;font-size:13.5px;color:var(--red);opacity:0;transition:opacity .2s;}
  .gate .err.show{opacity:1;}
  .gate .foot{margin-top:36px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
  .gate.shake .gate-inner{animation:shake .38s var(--ease);}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}

  /* ---------- Chrome ---------- */
  header.bar{position:fixed;top:0;left:0;right:0;height:64px;z-index:40;display:flex;align-items:center;gap:22px;padding:0 28px;background:rgba(252,251,248,0.88);backdrop-filter:saturate(1.2) blur(14px);border-bottom:1px solid var(--line);}
  .mark{display:flex;align-items:baseline;gap:12px;white-space:nowrap;min-width:0;}
  .mark .word{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink);font-weight:700;}
  .mark .sep{width:1px;height:14px;background:var(--line-strong);display:inline-block;transform:translateY(2px);}
  .mark .sub{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);overflow:hidden;text-overflow:ellipsis;}
  @media (max-width:1120px){.mark .sub{display:none;}}
  .rail{flex:1;display:flex;align-items:center;gap:14px;min-width:0;}
  .track{position:relative;height:2px;background:var(--line);flex:1;border-radius:2px;overflow:hidden;}
  .track .fill{position:absolute;inset:0 auto 0 0;width:0;background:var(--bronze);transition:width .6s var(--ease);}
  .clock{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums;}
  .tools{display:flex;align-items:center;gap:8px;}
  .tool{appearance:none;border:1px solid var(--line-strong);background:transparent;color:var(--ink-2);font-family:var(--sans);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:9px 13px;border-radius:999px;cursor:pointer;transition:all .25s var(--ease);white-space:nowrap;}
  .tool:hover{border-color:var(--bronze);color:var(--bronze-deep);background:var(--bronze-tint);}
  .tool.on{background:var(--ink);border-color:var(--ink);color:var(--bg);}

  /* ---------- Stage ---------- */
  main{position:fixed;top:64px;bottom:86px;left:0;right:0;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;}
  .wrap{max-width:1120px;margin:0 auto;padding:44px 40px 72px;}
  @media (max-width:720px){.wrap{padding:32px 20px 60px;}}
  section.step{display:none;}
  section.step.active{display:block;}
  section.step.active .rise{animation:rise .5s var(--ease) both;}
  section.step.active .rise:nth-child(1){animation-delay:.02s}
  section.step.active .rise:nth-child(2){animation-delay:.07s}
  section.step.active .rise:nth-child(3){animation-delay:.12s}
  section.step.active .rise:nth-child(4){animation-delay:.17s}
  section.step.active .rise:nth-child(5){animation-delay:.22s}
  @keyframes rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important;}}

  .eyebrow{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--bronze-deep);font-weight:700;margin:0 0 16px;display:flex;align-items:center;gap:12px;}
  .eyebrow:before{content:"";width:22px;height:1px;background:var(--bronze);display:block;}
  h1{font-family:var(--serif);font-weight:400;color:var(--ink);font-size:clamp(36px,4.2vw,56px);line-height:1.06;letter-spacing:-0.015em;margin:0 0 18px;}
  h2{font-family:var(--serif);font-weight:400;color:var(--ink);font-size:clamp(28px,3vw,42px);line-height:1.1;letter-spacing:-0.012em;margin:0 0 14px;}
  h3{font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:0 0 14px;}
  .lede{font-size:19px;line-height:1.5;color:var(--ink-2);max-width:64ch;margin:0 0 34px;}
  .lede em{font-family:var(--serif);font-style:italic;color:var(--ink);}
  hr.rule{border:0;height:1px;background:var(--line);margin:36px 0;}
  .ask{font-family:var(--serif);font-style:italic;font-size:21px;color:var(--bronze-deep);margin:0 0 22px;}
  .hint{font-size:13.5px;color:var(--muted);margin:6px 0 18px;}

  .grid{display:grid;gap:16px;}
  .g2{grid-template-columns:repeat(2,1fr);}
  .g3{grid-template-columns:repeat(3,1fr);}
  .g4{grid-template-columns:repeat(4,1fr);}
  @media (max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr;}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px 24px;box-shadow:var(--shadow);}
  .card.flat{box-shadow:none;background:transparent;}

  /* Settled-from-Call-One block */
  .settled{background:var(--bronze-tint);border:1px solid var(--line);border-left:3px solid var(--bronze);border-radius:0 12px 12px 0;padding:18px 22px;}
  .settled .tag{display:inline-flex;align-items:center;gap:8px;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--bronze-deep);font-weight:700;margin-bottom:10px;}
  .settled .tag svg{width:13px;height:13px;}
  .settled h4{font-family:var(--serif);font-weight:400;font-size:20px;margin:0 0 6px;letter-spacing:-0.01em;}
  .settled p{margin:0;color:var(--ink-2);font-size:15px;line-height:1.5;}
  .settled ul{margin:8px 0 0;padding-left:18px;color:var(--ink-2);font-size:15px;}
  .settled li{margin-bottom:5px;}

  label.field{display:block;margin-bottom:18px;}
  label.field > span, .flabel{display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:8px;}
  input[type=text], input[type=date], input[type=time], textarea{
    width:100%;font-family:var(--sans);font-size:16px;color:var(--ink);background:var(--card);
    border:1px solid var(--line);border-radius:10px;padding:12px 14px;line-height:1.5;resize:vertical;
    transition:border-color .2s var(--ease), box-shadow .2s var(--ease), background .2s var(--ease);
  }
  textarea{min-height:80px;}
  textarea.short{min-height:56px;}
  input:focus, textarea:focus{outline:none;border-color:var(--bronze);box-shadow:0 0 0 4px var(--bronze-tint);background:#fff;}
  input::placeholder, textarea::placeholder{color:#A9A49A;}
  .counter{font-size:11px;color:#B4AEA3;text-align:right;margin-top:4px;font-variant-numeric:tabular-nums;}

  /* choices / segmented */
  .choices{display:flex;flex-wrap:wrap;gap:9px;}
  .choice{appearance:none;cursor:pointer;font-family:var(--sans);background:var(--card);border:1px solid var(--line-strong);color:var(--ink-2);padding:10px 18px;border-radius:999px;font-size:14px;transition:all .22s var(--ease);}
  .choice:hover{border-color:var(--bronze);color:var(--bronze-deep);}
  .choice[aria-pressed=true]{background:var(--ink);border-color:var(--ink);color:var(--bg);}
  .choice.bronze[aria-pressed=true]{background:var(--bronze);border-color:var(--bronze);color:#fff;}
  .seg{display:inline-flex;gap:6px;}
  .seg .choice{padding:8px 14px;min-width:40px;text-align:center;}
  .lvl .choice[data-value=Low][aria-pressed=true]{background:var(--green);border-color:var(--green);color:#fff;}
  .lvl .choice[data-value=Medium][aria-pressed=true]{background:var(--amber);border-color:var(--amber);color:#fff;}
  .lvl .choice[data-value=High][aria-pressed=true]{background:var(--red);border-color:var(--red);color:#fff;}

  /* selectable big cards */
  .pick{text-align:left;cursor:pointer;font-family:var(--sans);background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;transition:all .28s var(--ease);position:relative;}
  .pick:hover{transform:translateY(-2px);border-color:var(--line-strong);}
  .pick[aria-pressed=true]{border-color:var(--bronze);box-shadow:0 0 0 1px var(--bronze), var(--shadow);}
  .pick .tick{position:absolute;top:18px;right:18px;width:20px;height:20px;border-radius:50%;border:1px solid var(--line-strong);display:grid;place-items:center;transition:all .3s var(--ease);}
  .pick[aria-pressed=true] .tick{background:var(--bronze);border-color:var(--bronze);}
  .pick .tick svg{width:11px;height:11px;opacity:0;transition:opacity .3s var(--ease);}
  .pick[aria-pressed=true] .tick svg{opacity:1;}
  .pick .kicker{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--bronze-deep);font-weight:700;margin-bottom:10px;display:block;}
  .pick h4{font-family:var(--serif);font-size:22px;font-weight:400;margin:0 0 8px;letter-spacing:-0.01em;}
  .pick p{margin:0;font-size:14px;color:var(--ink-2);line-height:1.5;}
  .pick.locked{cursor:default;border-color:var(--bronze);background:var(--bronze-tint);}
  .pick.locked:hover{transform:none;}

  /* checkbox row */
  .check{display:flex;align-items:flex-start;gap:12px;cursor:pointer;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px;transition:all .22s var(--ease);font-size:15px;}
  .check:hover{border-color:var(--line-strong);}
  .check input{position:absolute;opacity:0;pointer-events:none;}
  .box{width:19px;height:19px;border-radius:5px;border:1px solid var(--line-strong);display:grid;place-items:center;flex:none;transition:all .22s var(--ease);background:#fff;margin-top:1px;}
  .box svg{width:11px;height:11px;opacity:0;transform:scale(.6);transition:all .22s var(--ease);}
  .check input:checked ~ .box{background:var(--bronze);border-color:var(--bronze);}
  .check input:checked ~ .box svg{opacity:1;transform:none;}
  .check input:focus-visible ~ .box{box-shadow:0 0 0 4px var(--bronze-tint);}
  .check .txt{color:var(--ink-2);}

  /* disclosure */
  details.disc{margin-top:6px;border-top:1px dashed var(--line);padding-top:12px;}
  details.disc>summary{cursor:pointer;list-style:none;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--bronze-deep);font-weight:700;display:inline-flex;align-items:center;gap:8px;}
  details.disc>summary::-webkit-details-marker{display:none;}
  details.disc>summary:before{content:"+";font-size:15px;line-height:1;}
  details.disc[open]>summary:before{content:"–";}
  details.disc>summary:hover{color:var(--bronze);}
  .disc-body{margin-top:14px;}

  /* builder rows */
  .brow{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow);}
  .brow.parked{background:var(--bg-deep);opacity:.85;}
  .brow-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .brow-head .idx{font-family:var(--serif);color:var(--bronze);font-size:15px;min-width:22px;}
  .brow-head .nm{flex:1;}
  .brow-head input[type=text]{font-family:var(--serif);font-size:19px;padding:8px 12px;}
  .rowbtns{display:flex;gap:6px;flex-wrap:wrap;}
  .ibtn{appearance:none;cursor:pointer;background:var(--card);border:1px solid var(--line-strong);color:var(--ink-2);width:32px;height:32px;border-radius:8px;display:grid;place-items:center;font-size:14px;transition:all .2s var(--ease);}
  .ibtn:hover{border-color:var(--bronze);color:var(--bronze-deep);background:var(--bronze-tint);}
  .ibtn:disabled{opacity:.3;cursor:not-allowed;}
  .ibtn svg{width:14px;height:14px;}
  .pill-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .textbtn{appearance:none;cursor:pointer;background:transparent;border:1px solid var(--line-strong);color:var(--ink-2);font-family:var(--sans);font-size:12.5px;letter-spacing:.02em;padding:8px 14px;border-radius:999px;transition:all .2s var(--ease);}
  .textbtn:hover{border-color:var(--bronze);color:var(--bronze-deep);background:var(--bronze-tint);}
  .textbtn[aria-pressed=true]{background:var(--bronze);border-color:var(--bronze);color:#fff;}
  .addbtn{appearance:none;cursor:pointer;background:var(--ink);color:#fff;border:1px solid var(--ink);font-family:var(--sans);font-size:13px;padding:11px 20px;border-radius:999px;transition:all .2s var(--ease);}
  .addbtn:hover{background:var(--bronze-deep);border-color:var(--bronze-deep);}
  .addbtn:disabled{opacity:.35;cursor:not-allowed;}

  /* scoring matrix */
  .scorecard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow);}
  .scorecard.on{border-color:var(--bronze);box-shadow:0 0 0 1px var(--bronze),var(--shadow);}
  .sc-head{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:8px;}
  .sc-head h4{font-family:var(--serif);font-weight:400;font-size:22px;margin:0;}
  .sc-avg{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
  .sc-avg b{font-family:var(--serif);font-size:20px;color:var(--bronze-deep);margin-left:6px;}
  .crit{display:grid;grid-template-columns:1fr auto;gap:8px 14px;align-items:center;padding:7px 0;border-top:1px solid var(--line);}
  .crit span{font-size:14px;color:var(--ink-2);}
  .role-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}

  /* metric grid */
  .mcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;transition:all .22s var(--ease);}
  .mcard.on{border-color:var(--bronze);box-shadow:0 0 0 1px var(--bronze);}
  .mcard-head{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .mcard-head .nm{font-weight:600;font-size:15px;}
  .mcard-body{margin-top:12px;display:none;}
  .mcard.on .mcard-body{display:block;}

  /* open-item gate */
  .gate-inline{background:#fff;border:1px solid var(--bronze);border-radius:14px;padding:20px 22px;margin-top:24px;box-shadow:var(--shadow);animation:rise .3s var(--ease) both;}
  .gate-inline h4{font-family:var(--serif);font-weight:400;font-size:20px;margin:0 0 8px;}
  .gate-inline ul{margin:8px 0 16px;padding-left:18px;color:var(--ink-2);font-size:14.5px;}
  .gate-inline li{margin-bottom:4px;}
  .gate-inline .row{display:flex;gap:10px;flex-wrap:wrap;}

  /* completion + open badges */
  .status{margin-top:30px;display:inline-flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:999px;padding:9px 18px 9px 11px;background:var(--card);font-size:13px;color:var(--muted);}
  .status .dot{width:19px;height:19px;border-radius:50%;border:1px solid var(--line-strong);display:grid;place-items:center;transition:all .35s var(--ease);}
  .status .dot svg{width:10px;height:10px;opacity:0;transition:opacity .3s var(--ease);}
  .status.done{border-color:var(--bronze);color:var(--bronze-deep);}
  .status.done .dot{background:var(--bronze);border-color:var(--bronze);}
  .status.done .dot svg{opacity:1;}

  .note-op{font-size:12px;color:var(--amber);letter-spacing:.04em;}

  /* community path */
  .pathmap{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px;}
  .pathnode{flex:1;min-width:120px;background:var(--bronze-tint);border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center;font-size:13px;color:var(--ink-2);position:relative;}
  .pathnode b{display:block;font-family:var(--serif);font-size:15px;color:var(--ink);margin-bottom:2px;}
  .pathnode .n{font-size:10px;color:var(--bronze-deep);font-weight:700;letter-spacing:.1em;}

  /* reveal */
  .tierbar{display:flex;gap:8px;margin:6px 0 26px;}
  .bp{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
  @media (max-width:900px){.bp{grid-template-columns:1fr;}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px 24px;opacity:0;transform:translateY(10px);}
  .panel.in{animation:rise .5s var(--ease) forwards;}
  .panel.wide{grid-column:1 / -1;}
  .panel header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;}
  .panel h3{margin:0;}
  .panel .chk{width:22px;height:22px;border-radius:50%;background:var(--bronze-tint);display:grid;place-items:center;}
  .panel .chk svg{width:12px;height:12px;opacity:0;transform:scale(.5);}
  .panel.in .chk svg{animation:pop .45s var(--ease) .3s forwards;}
  @keyframes pop{to{opacity:1;transform:none;}}
  .val{font-family:var(--serif);font-size:20px;line-height:1.4;color:var(--ink);white-space:pre-wrap;}
  .val.sm{font-size:16px;font-family:var(--sans);color:var(--ink-2);}
  ul.blist{list-style:none;margin:0;padding:0;}
  ul.blist li{padding:9px 0;border-bottom:1px dashed var(--line);display:flex;gap:11px;align-items:baseline;font-size:15.5px;color:var(--ink-2);}
  ul.blist li:last-child{border-bottom:0;}
  ul.blist li .idx{font-family:var(--serif);color:var(--bronze);font-size:13px;min-width:16px;}
  .op-item{color:var(--amber);font-style:italic;}
  .empty{color:#B4AEA3;font-style:italic;font-size:14.5px;}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:999px;border:1px solid var(--line-strong);color:var(--muted);}
  .chip.Low{background:var(--green);border-color:var(--green);color:#fff;}
  .chip.Medium{background:var(--amber);border-color:var(--amber);color:#fff;}
  .chip.High{background:var(--red);border-color:var(--red);color:#fff;}

  /* ---------- Footer nav ---------- */

    function keptList(){ return eco.pillars.filter(function(p){return p.status!=="park";}); }

      var arr=eco.pillars;
      var kept=keptList(); var kIdx=kept.findIndex(function(p){return p.id===id;});
      var target=kept[kIdx+dir]; if(!target) return;
      var a=arr.indexOf(kept[kIdx]), b=arr.indexOf(target);

    function mergePillar(id){
      var kept=keptList().filter(function(p){return p.id!==id;});
      if(!kept.length){ alert("Nothing to merge into — need at least one other active pillar."); return; }
      var src=eco.pillars.find(function(p){return p.id===id;});
      var names=kept.map(function(p,i){return (i+1)+". "+(p.name||"(unnamed)");}).join("\n");
      var ans=prompt("Merge “"+(src.name||"this pillar")+"” into which active pillar?\n\n"+names+"\n\nType the number:");

      fieldEl("Date", function(){return sc.date;}, function(v){sc.date=v;}, {type:"date"}),
      fieldEl("Time", function(){return sc.time;}, function(v){sc.time=v;}, {type:"time"}),
      (function(){ var w=h("label",{class:"field"}); w.appendChild(h("span",{text:"Status"})); w.appendChild(segEl(["Booked","Options pending"], function(){return sc.status;}, function(v){sc.status=v;}, {bronze:true})); return w; })(),
      fieldEl("Prep notes", function(){return sc.notes;}, function(v){sc.notes=v;}, {ph:"What to prepare",max:120})
    ]));
    root.appendChild(h("p",{class:"hint rise",text:"48 hours’ notice · Sunday–Friday · 8 AM – 5 PM Pacific. If not booked live, set the options deadline."}));
    root.appendChild(statusBadge("homework","Homework assigned · Call Three in motion"));
  }
  function vHomework(){ var m=[];
    var real=state.homework.filter(function(x){return x.item.trim()&&x.deadline.trim();});
    if(real.length<3) m.push("At least 3 homework items with a deadline");
    var sc=state.scheduling;
    if(!sc.status) m.push("Call Three status (booked or options pending)");
    else if(sc.status==="Booked" && !(sc.date&&sc.time)) m.push("Call Three date and time");
    return {ok:!m.length, missing:m};
  }

  /* ---------------- final reveal ---------------- */
  function rReveal(root){
    root.appendChild(eyebrow("Final blueprint"));
    root.appendChild(h("h2",{class:"rise",text:"Your complete growth blueprint."}));
    root.appendChild(h("p",{class:"lede rise",text:"Every locked decision, assembled. Watch for the full written report within 24 hours."}));
    var bar=h("div",{class:"tierbar rise"});
    var t1=h("button",{class:"choice bronze","aria-pressed":"true",text:"Executive blueprint"});
    var t2=h("button",{class:"choice",text:"Full detail"});
    bar.appendChild(t1); bar.appendChild(t2);
    root.appendChild(bar);
    var tier1=h("div",{class:"bp",id:"tier1"});
    var tier2=h("div",{class:"bp bp2",id:"tier2",style:"margin-top:18px;display:none"});
    root.appendChild(tier1); root.appendChild(tier2);
    t1.addEventListener("click",function(){ t1.setAttribute("aria-pressed","true"); t2.setAttribute("aria-pressed","false"); t2.classList.remove("bronze"); t1.classList.add("bronze"); tier2.style.display="none"; buildReveal(tier1,tier2); stagger(tier1); });
    t2.addEventListener("click",function(){ t2.setAttribute("aria-pressed","true"); t1.setAttribute("aria-pressed","false"); t1.classList.remove("bronze"); t2.classList.add("bronze"); tier2.style.display="grid"; buildReveal(tier1,tier2); stagger(tier2); });

    var actions=h("div",{class:"rise",style:"margin-top:36px;display:flex;gap:12px;flex-wrap:wrap"});
    var pr=h("button",{class:"navbtn primary",text:"Print / Save PDF"}); pr.addEventListener("click",doPrint);
    var rp=h("button",{class:"navbtn",text:"Replay reveal"}); rp.addEventListener("click",function(){ buildReveal(tier1,tier2); stagger(tier1.style.display==="none"?tier2:tier1); });
    actions.appendChild(pr); actions.appendChild(rp);
    root.appendChild(actions);
    root.appendChild(h("div",{class:"print-foot",text:"Confidential — prepared exclusively for Noah Westbrook · The Content Operating System · Call Two"}));

    buildReveal(tier1,tier2);
    setTimeout(function(){ stagger(tier1); },30);
  }
  function val(v){ return (v&&String(v).trim())? String(v): null; }
  function panel(title,wide){ var p=h("div",{class:"panel"+(wide?" wide":"")}); p.appendChild(h("header",{},[h("h3",{text:title}),h("span",{class:"chk",html:CKB})])); return p; }
  function openItem(){ return h("span",{class:"op-item",text:"Open item"}); }
  function put(p,content){ if(content==null){ p.appendChild(openItem()); } else if(typeof content==="string"){ p.appendChild(h("div",{class:"val",text:content})); } else { p.appendChild(content); } return p; }
  function bl(items){ var ul=h("ul",{class:"blist"}); if(!items.length){ ul.appendChild(h("li",{},[h("span",{class:"empty",text:"Open item"})])); } items.forEach(function(it,i){ var li=h("li"); li.appendChild(h("span",{class:"idx",text:("0"+(i+1)).slice(-2)})); var b=h("span"); if(it.html) b.innerHTML=it.html; else b.textContent=it.text; li.appendChild(b); ul.appendChild(li); }); return ul; }

  function buildReveal(tier1,tier2){
    tier1.innerHTML=""; tier2.innerHTML="";
    var f=state.foundation, p=state.platforms, eco=state.ecosystem, r=state.rollout, mg=state.messaging, mt=state.metrics;

    /* ---- Tier 1 ---- */
    tier1.appendChild(put(panel("Final creator identity",true), val(f.identity)||C1.identity));
    var aud=panel("Agents-first audience"); put(aud, C1.audiencePrimary+" — primary."); aud.appendChild(h("div",{class:"val sm",style:"margin-top:8px",text:(val(f.secondaryAudience)||C1.audienceSecondary)+" — secondary."})); tier1.appendChild(aud);
    tier1.appendChild(put(panel("Central promise"), val(f.promise)||val(mg.promise)));
    var ph=panel("Platform hierarchy");
    var hier=[]; if(val(p.primary)) hier.push({html:"<strong>Primary</strong> — "+esc(p.primary)}); if(val(p.secondary)) hier.push({html:"<strong>Secondary</strong> — "+esc(p.secondary)}); if(val(p.tertiary)) hier.push({html:"<strong>Tertiary</strong> — "+esc(p.tertiary)});
    ph.appendChild(bl(hier)); tier1.appendChild(ph);
    var pil=panel("Final pillars",true);
    var pl=eco.pillars.filter(function(x){return x.status!=="park"&&x.name.trim();}).map(function(x){ return {html:"<strong>"+esc(x.name)+"</strong>"+(x.format?' <span class="chip">'+esc(x.format)+"</span>":"")+(x.purpose?"<br>"+esc(x.purpose):"")}; });
    pil.appendChild(bl(pl)); tier1.appendChild(pil);
    var ro=panel("365-day rollout",true);
    var rp2=r.phases.filter(function(x){return x.name.trim();}).map(function(x){ return {html:"<strong>"+esc(x.name)+"</strong>"+(x.duration?' <span class="chip">'+esc(x.duration)+"</span>":"")+(x.objective?"<br>"+esc(x.objective):"")}; });
    ro.appendChild(bl(rp2)); tier1.appendChild(ro);
    var cad=panel("Publishing cadence");
    var pb=state.publishing; var cadItems=[]; if(val(pb.standard)) cadItems.push({html:"<strong>Standard</strong> — "+esc(pb.standard)}); if(val(pb.minViable)) cadItems.push({html:"<strong>Minimum</strong> — "+esc(pb.minViable)}); if(val(pb.nonNeg)) cadItems.push({html:"<strong>Non-negotiable</strong> — "+esc(pb.nonNeg)});
    cad.appendChild(bl(cadItems)); tier1.appendChild(cad);
    var cm=panel("Community-to-agency path",true);
    cm.appendChild(h("div",{class:"val sm",text:"Viewer → Follower → Trusted community member → Conversation → Mentorship / recruiting interest → Qualified future agency relationship"}));
    tier1.appendChild(cm);
    tier1.appendChild(put(panel("North Star metric"), val(mt.northStar)));
    var rm=panel("Risk mitigations",true);
    rm.appendChild(bl(state.risks.map(function(x){ var chip=x.rating?' <span class="chip '+x.rating+'">'+x.rating+"</span>":' <span class="chip">Open item</span>'; return {html:"<strong>"+esc(x.name)+"</strong>"+chip+(x.mitigation?"<br>"+esc(x.mitigation):"")}; }))); tier1.appendChild(rm);
    var c3date=panel("Call Three"); var sc=state.scheduling; var c3=[val(sc.date),val(sc.time)].filter(Boolean).join(" · "); put(c3date, c3? c3: (val(sc.status)||null)); c3date.appendChild(h("div",{class:"val sm",style:"margin-top:8px",text:"Written report within 24 hours."})); tier1.appendChild(c3date);

    /* ---- Tier 2 ---- */
    var fm=panel("Formats & series",true); fm.appendChild(bl(eco.formats.filter(function(x){return x.name.trim();}).map(function(x){return {html:"<strong>"+esc(x.name)+"</strong>"+(x.desc?" — "+esc(x.desc):"")};}))); tier2.appendChild(fm);
    var map=panel("Pillar → format map",true); map.appendChild(bl(eco.pillars.filter(function(x){return x.status!=="park"&&x.name.trim();}).map(function(x){return {html:"<strong>"+esc(x.name)+"</strong> → "+(x.format?esc(x.format):'<span class="op-item">Open item</span>')};}))); tier2.appendChild(map);
    var tr=panel("Transparency"); var t=state.transparency; put(tr, val(t.level)); if(val(t.shown)) tr.appendChild(h("div",{class:"val sm",style:"margin-top:8px",text:t.shown})); tier2.appendChild(tr);
    var cpl=panel("Compliance"); cpl.appendChild(bl(COMPLIANCE_CATS.map(function(mc){ var it=state.compliance.cats[mc[0]]||{status:"Unresolved"}; return {html:"<strong>"+mc[1]+"</strong> — "+esc(it.status||"Unresolved")}; }))); tier2.appendChild(cpl);
    var met=panel("Metrics detail",true); var inc=Object.keys(mt.items).filter(function(k){return mt.items[k].included;}); met.appendChild(bl(inc.map(function(k){ var nm=(METRIC_CATS.filter(function(c){return c[0]===k;})[0]||[k,k])[1]; var it=mt.items[k]; return {html:"<strong>"+nm+"</strong>"+(it.importance?' <span class="chip">'+it.importance+"/5</span>":"")+(it.healthy?"<br>Healthy: "+esc(it.healthy):"")}; }))); if(val(mt.reviewFreq)) met.appendChild(h("div",{class:"val sm",style:"margin-top:10px",text:"Reviewed "+mt.reviewFreq.toLowerCase()+"."})); tier2.appendChild(met);
    var msg=panel("Messaging & trust",true); var mi=[]; if(val(mg.belief)) mi.push({html:"<strong>Believes</strong> — "+esc(mg.belief)}); if(val(mg.standsFor)) mi.push({html:"<strong>Stands for</strong> — "+esc(mg.standsFor)}); if(val(mg.refuses)) mi.push({html:"<strong>Refuses</strong> — "+esc(mg.refuses)}); if(mg.proofTypes.length) mi.push({html:"<strong>Proof</strong> — "+mg.proofTypes.map(esc).join(", ")}); if(val(mg.guardrails)) mi.push({html:"<strong>Guardrails</strong> — "+esc(mg.guardrails)}); msg.appendChild(bl(mi)); tier2.appendChild(msg);
    var rn=panel("Full risk notes",true); rn.appendChild(bl(state.risks.map(function(x){ return {html:"<strong>"+esc(x.name)+"</strong>"+(x.evidence?"<br>Evidence: "+esc(x.evidence):"")+(x.warning?"<br>Warning: "+esc(x.warning):"")+(x.callThree?"<br>Call Three: "+esc(x.callThree):"")}; }))); tier2.appendChild(rn);
    var c3r=panel("Call Three requirements",true); c3r.appendChild(bl(CALL3_CATS.map(function(cc){ var it=state.callThree.cats[cc[0]]||{}; return {html:"<strong>"+cc[1]+"</strong> — "+(it.objective?esc(it.objective):'<span class="op-item">Open item</span>')}; }))); tier2.appendChild(c3r);
    var hw=panel("Homework",true); hw.appendChild(bl(state.homework.filter(function(x){return x.item.trim();}).map(function(x){ return {html:(x.done?"✓ ":"○ ")+esc(x.item)+(x.deadline?' <span class="chip">'+esc(x.deadline)+"</span>":"")+(x.owner?" · "+esc(x.owner):"")}; }))); tier2.appendChild(hw);
    var openList=collectOpenItems();
    var oi=panel("Open items",true); if(openList.length){ oi.appendChild(bl(openList.map(function(o){return {html:"<strong>"+esc(o.section)+"</strong> — "+esc(o.question)};}))); } else { oi.appendChild(h("div",{class:"val sm",text:"Nothing outstanding — every live decision is locked."})); } tier2.appendChild(oi);
  }
  function stagger(container){
    var panels=Array.prototype.slice.call(container.querySelectorAll(".panel"));
    panels.forEach(function(p){p.classList.remove("in");});
    void container.offsetWidth;
    panels.forEach(function(p,i){ setTimeout(function(){p.classList.add("in");}, 110*i); });
  }
  function collectOpenItems(){
    var list=[];
    SECTIONS.forEach(function(s){
      if(s.key==="reveal") return;
      var v=s.live(); if(!v.ok){ v.missing.forEach(function(mm){ list.push({section:s.label, question:mm}); }); }
    });
    return list;
  }

  /* =========================================================================
     ENGINE: build shell, navigation, validation gate, notes, tools
     ======================================================================= */
  var stageWrap=document.getElementById("stageWrap");
  var sectionEls=[];
  SECTIONS.forEach(function(s,i){
    var sec=h("section",{class:"step","data-key":s.key,"data-title":s.label,"data-time":s.time});
    s.render(sec);
    stageWrap.appendChild(sec);
    sectionEls.push(sec);
  });

  var idx = (typeof state.currentSection==="number" && state.currentSection>=0 && state.currentSection<SECTIONS.length)? state.currentSection : 0;
  var dots=document.getElementById("dots");
  var fill=document.getElementById("fill");
  var clock=document.getElementById("clock");

  SECTIONS.forEach(function(s,i){
    var b=h("button",{class:"dot-btn","aria-label":(i+1)+". "+s.label,title:(i+1)+" · "+s.label},[h("i")]);
    b.addEventListener("click",function(){ go(i); });
    dots.appendChild(b);
  });

  function renderCurrent(){
    var s=SECTIONS[idx]; var sec=sectionEls[idx];
    sec.innerHTML=""; s.render(sec); refreshStatus();
  }

  function refreshStatus(){
    SECTIONS.forEach(function(s,i){
      var v=s.live(); var dot=dots.children[i];
      dot.classList.toggle("active", i===idx);
      dot.classList.toggle("past", i<idx && v.ok);
      dot.classList.toggle("partial", i<idx && !v.ok);
    });
    var cur=SECTIONS[idx]; var badge=sectionEls[idx].querySelector('[data-status]');
    if(badge){ var v=cur.live(); badge.classList.toggle("done", v.ok); }
  }

  function go(n){
    if(n<0||n>=SECTIONS.length) return;
    var g=sectionEls[idx].querySelector(".gate-inline"); if(g) g.remove();
    sectionEls[idx].classList.remove("active");
    idx=n; state.currentSection=idx; queueSave();
    var sec=sectionEls[idx];
    if(SECTIONS[idx].key==="reveal"){ sec.innerHTML=""; SECTIONS[idx].render(sec); }
    sec.classList.add("active");
    fill.style.width=(idx/(SECTIONS.length-1)*100)+"%";
    clock.textContent=(idx+1)+" / "+SECTIONS.length+" · "+SECTIONS[idx].label;
    document.getElementById("back").disabled=(idx===0);
    document.getElementById("next").disabled=(idx===SECTIONS.length-1);
    document.getElementById("stage").scrollTop=0;
    refreshStatus();
    if(notesOn) paintNotes();
  }

  function attemptNext(){
    if(idx>=SECTIONS.length-1) return;
    var s=SECTIONS[idx]; var v=s.live();
    var existing=sectionEls[idx].querySelector(".gate-inline");
    if(v.ok || existing){ if(existing) existing.remove(); go(idx+1); return; }
    var g=h("div",{class:"gate-inline"});
    g.appendChild(h("h4",{text:"A few items are still open here."}));
    var ul=h("ul"); v.missing.forEach(function(m){ ul.appendChild(h("li",{text:m})); }); g.appendChild(ul);
    var row=h("div",{class:"row"});
    var ret=h("button",{class:"navbtn",text:"Return to open items"});
    ret.addEventListener("click",function(){ g.remove(); });
    var cont=h("button",{class:"navbtn primary",text:"Continue and mark open"});
    cont.addEventListener("click",function(){ g.remove(); go(idx+1); });
    row.appendChild(ret); row.appendChild(cont); g.appendChild(row);
    sectionEls[idx].appendChild(g);
    g.scrollIntoView({behavior:"smooth",block:"center"});
  }

  document.getElementById("next").addEventListener("click",attemptNext);
  document.getElementById("back").addEventListener("click",function(){ go(idx-1); });

  document.addEventListener("keydown",function(e){
    var t=e.target, typing=t&&(t.tagName==="INPUT"||t.tagName==="TEXTAREA"||t.isContentEditable);
    if(e.shiftKey && (e.key==="F"||e.key==="f")){ e.preventDefault(); toggleNotes(); return; }
    if(typing) return;
    if(e.key==="ArrowRight"||e.key==="PageDown"){ e.preventDefault(); attemptNext(); }
    if(e.key==="ArrowLeft"||e.key==="PageUp"){ e.preventDefault(); go(idx-1); }
    if(e.key==="Home"){ go(0); }
    if(e.key==="End"){ go(SECTIONS.length-1); }
  });

  /* ---- facilitator notes ---- */
  var fnotes=document.getElementById("fnotes"), fnotesBody=document.getElementById("fnotesBody"),
      notesBtn=document.getElementById("notesBtn"), notesOn=false;
  function paintNotes(){
    var n=NOTES[SECTIONS[idx].key]; fnotesBody.innerHTML="";
    if(!n){ fnotesBody.appendChild(h("p",{text:"No notes for this section."})); return; }
    function add(lbl,txt){ if(!txt) return; var p=h("p"); p.innerHTML="<strong>"+lbl+":</strong> "+esc(txt); fnotesBody.appendChild(p); }
    add("Objective",n.o);
    if(n.say){ var p=h("p"); p.innerHTML='<strong>Say:</strong> <span class="say">'+esc(n.say)+"</span>"; fnotesBody.appendChild(p); }
    add("Decision criteria",n.crit);
    add("Park",n.park);
    add("Output",n.out);
  }
  function toggleNotes(force){
    notesOn=(typeof force==="boolean")?force:!notesOn;
    fnotes.classList.toggle("show",notesOn);
    notesBtn.setAttribute("aria-pressed",notesOn?"true":"false");
    notesBtn.classList.toggle("on",notesOn);
    if(notesOn) paintNotes();
  }
  notesBtn.addEventListener("click",function(){ toggleNotes(); });

  /* ---- print ---- */
  function doPrint(){ toggleNotes(false); if(idx!==SECTIONS.length-1){ var sec=sectionEls[SECTIONS.length-1]; sec.innerHTML=""; SECTIONS[SECTIONS.length-1].render(sec); } setTimeout(function(){ window.print(); },140); }
  document.getElementById("printBtn").addEventListener("click",doPrint);

  /* ---- reset (Call Two only) ---- */
  document.getElementById("resetBtn").addEventListener("click",function(){
    if(!window.confirm("Reset the Call Two blueprint? This clears everything typed today and restores the Call One foundation. Your access stays active; Call One data is untouched.")) return;
    if(!window.confirm("Confirm once more — the Call Two workspace will be cleared.")) return;
    try{ localStorage.removeItem(KEY); }catch(e){}
    state=fresh();
    stageWrap.innerHTML=""; sectionEls=[];
    SECTIONS.forEach(function(s){ var sec=h("section",{class:"step","data-key":s.key,"data-title":s.label,"data-time":s.time}); s.render(sec); stageWrap.appendChild(sec); sectionEls.push(sec); });
    idx=0; save(); go(0); flash("Blueprint reset");
  });

  /* ---- toast ---- */
  var toast=document.getElementById("toast"), toastT;
  function flash(msg){ toast.textContent=msg; toast.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(function(){toast.classList.remove("show");},1700); }
  var lastFlash=0;
  function flashSaved(){ var now=Date.now(); if(now-lastFlash>4000){ lastFlash=now; flash("Saved"); } }

  /* ---- boot ---- */
  sectionEls[0].classList.add("active");
  go(idx);
  save();
})();
</script>
</body>
</html>
